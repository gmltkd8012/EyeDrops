name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build DMG
        run: ./gradlew :composeApp:packageDmg

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: composeApp/build/compose/binaries/main/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build MSI
        run: ./gradlew :composeApp:packageMsi

      - name: Upload jpackage error log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jpackage-logs
          path: composeApp/build/compose/logs/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: composeApp/build/compose/binaries/main/msi/*.msi
